<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Minimal Electron Fixture</title>
  </head>
  <body>
    <h1 id="heading">Hello from fixture</h1>
    <p id="status">ready</p>
    <div id="app-root" class="root">
      <input id="name" type="text" placeholder="name" />
      <button id="go" type="button">Go</button>
    </div>
    <script>
      window.__FIXTURE__ = {
        name: "minimal-electron-app",
        version: 1,
        clicks: 0,
      };
      console.log("fixture-console-ok");
      console.warn("fixture-console-warn");
      fetch("data:application/json,{\"ok\":true}").catch(() => {});

      document.getElementById("go").addEventListener("click", () => {
        window.__FIXTURE__.clicks += 1;
        const name = document.getElementById("name").value || "anonymous";
        document.getElementById("status").textContent = "clicked:" + name;
        console.log("fixture-clicked:" + name);
      });
    </script>
  </body>
</html>
